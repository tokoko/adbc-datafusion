# Configuration for cargo-about, used to generate license file reports.
accepted = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

# Clarify licenses for crates that bundle C libraries with GPL alternatives
# but where we're using the permissive license option

# zstd-sys bundles zstd source which is dual-licensed BSD-3-Clause OR GPL-2.0
# We use the BSD-3-Clause license and specify only the non-GPL license files
[zstd-sys.clarify]
license = "MIT OR Apache-2.0 OR BSD-3-Clause"

[[zstd-sys.clarify.files]]
path = "LICENSE"
license = "MIT OR Apache-2.0 OR BSD-3-Clause"
checksum = "a77b7cfeaf911ed410ffbe76f0cb2b24ad8a4d94e7ead5727e914425c416cc63"

[[zstd-sys.clarify.files]]
path = "LICENSE.Apache-2.0"
license = "Apache-2.0"
checksum = "0d542e0c8804e39aa7f37eb00da5a762149dc682d7829451287e11b938e94594"

[[zstd-sys.clarify.files]]
path = "LICENSE.BSD-3-Clause"
license = "BSD-3-Clause"
checksum = "48341f685c87304089aa099b23c386f8bacc519ef555aa7a13e239908907b3fd"

[[zstd-sys.clarify.files]]
path = "LICENSE.Mit"
license = "MIT"
checksum = "129e8edef29e9abcd2ebabe252f4ef1b1289cdca356bf0040284a2fbccfb96c8"

# liblzma-sys bundles xz source. The liblzma library itself is 0BSD.
# GPL licenses in the package are for command-line tools not used here.
[liblzma-sys.clarify]
license = "MIT OR Apache-2.0"

[[liblzma-sys.clarify.files]]
path = "LICENSE-APACHE"
license = "Apache-2.0"
checksum = "a60eea817514531668d7e00765731449fe14d059d3249e0bc93b36de45f759f2"

[[liblzma-sys.clarify.files]]
path = "LICENSE-MIT"
license = "MIT"
checksum = "a90e2da47bdc152cfb89e1fb09972143056c417ddbf86122babc83d0a8ad81d1"

# libbz2-rs-sys has a non-standard SPDX license identifier (bzip2-1.0.6)
[libbz2-rs-sys.clarify]
license = "MIT OR Apache-2.0"

[[libbz2-rs-sys.clarify.files]]
path = "LICENSE"
