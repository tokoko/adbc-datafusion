# !!!! AUTO-GENERATED FILE.  DO NOT EDIT. !!!!
# USE adbc-gen-workflow (see adbc-drivers/dev) TO UPDATE THIS FILE.

# This is a common workflow for building & testing drivers:
#
# - Build the driver
# - Start dependencies
# - Run tests
# - Build the shared library

name: Rust Test

on:
  pull_request:
    branches:
      - main
    paths:
      - "rust/**"
      - .github/workflows/rust_test.yaml
  push:
    branches:
      - main
    paths:
      - "rust/**"
      - .github/workflows/rust_test.yaml


concurrency:
  group: ${{ github.repository }}-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    name: "Test/${{ matrix.platform }}_${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { platform: linux, arch: amd64, runner: ubuntu-latest }
          - { platform: macos, arch: arm64, runner: macos-latest }
          - { platform: windows, arch: amd64, runner: windows-latest }
    permissions:
      contents: read
    steps:
      - name: free up disk space
        if: runner.os != 'Windows'
        run: |
          # Preinstalled tools use a lot of disk space, free up some space
          # https://github.com/actions/runner-images/issues/2840
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606  # v1.15.4
        with:
          components: "clippy"

      - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4
        with:
          pixi-version: v0.63.2
          run-install: false


      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: rust
        run: |
          if [[ -f ci/scripts/pre-build.sh ]]; then
            echo "Loading pre-build"
            ./ci/scripts/pre-build.sh test ${{ matrix.platform }} ${{ matrix.arch }}
          fi

          set -a
          if [[ -f .env.build ]]; then
            echo "Loading .env.build"
            source .env.build
          fi
          set +a

          cargo build --locked

      - name: Start Test Dependencies
        # Can't use Docker on macOS AArch64 runners, and Windows containers
        # work but often the container doesn't support Windows
        if: runner.os == 'Linux'
        working-directory: rust
        run: |
          if [[ -f compose.yaml ]]; then
            if ! docker compose up --detach --wait test-service; then
              echo "Service failed to start"
              echo "Logs:"
              docker compose logs test-service
              exit 1
            fi
          fi

      - name: Test
        working-directory: rust
        run: |
          set -a
          if [[ -f .env ]]; then
            source .env
          fi
          if [[ -f .env.${{ matrix.platform }} ]]; then
            source .env.${{ matrix.platform }}
          fi
          if [[ -f .env.ci ]]; then
            source .env.ci
          fi
          set +a

          if [[ -f ci/scripts/pre-test.sh ]]; then
            echo "Loading pre-test"
            ./ci/scripts/pre-test.sh ${{ matrix.platform }} ${{ matrix.arch }}
          fi

          cargo test

          if [[ -f ci/scripts/post-test.sh ]]; then
            ./ci/scripts/post-test.sh
          fi


  validate:
    name: "Validate/${{ matrix.platform }}_${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # I think we only need to test one platform, but we can change that later
          - { platform: linux, arch: amd64, runner: ubuntu-latest }
    permissions:
      contents: read
    steps:
      - name: free up disk space
        if: runner.os != 'Windows'
        run: |
          # Preinstalled tools use a lot of disk space, free up some space
          # https://github.com/actions/runner-images/issues/2840
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606  # v1.15.4
        with:
          components: "clippy"

      - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4
        with:
          pixi-version: v0.63.2
          run-install: false


      - name: Log in to ghcr.io
        if: runner.os == 'Linux'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Library
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: rust
        run: |
          if [[ -f ci/scripts/pre-build.sh ]]; then
            ./ci/scripts/pre-build.sh test ${{ matrix.platform }} ${{ matrix.arch }}
          fi
          set -a
          if [[ -f .env.build ]]; then
            echo "Loading .env.build"
            source .env.build
          fi
          if [[ -f .env.test ]]; then
            source .env.test
          fi
          set +a
          pixi run adbc-make build DEBUG=true VERBOSE=true DRIVER=datafusion IMPL_LANG=rust
      - name: Start Test Dependencies
        # Can't use Docker on macOS AArch64 runners, and Windows containers
        # work but often the container doesn't support Windows
        if: runner.os == 'Linux'
        working-directory: rust
        run: |
          if [[ -f compose.yaml ]]; then
            if ! docker compose up --detach --wait test-service; then
              echo "Service failed to start"
              echo "Logs:"
              docker compose logs test-service
              exit 1
            fi
          fi

      - name: Validate
        if: runner.os == 'Linux'
        working-directory: rust
        run: |
          set -a
          if [[ -f .env ]]; then
            source .env
          fi
          if [[ -f .env.${{ matrix.platform }} ]]; then
            source .env.${{ matrix.platform }}
          fi
          if [[ -f .env.ci ]]; then
            source .env.ci
          fi
          set +a

          if [[ -f ci/scripts/pre-test.sh ]]; then
            echo "Loading pre-test"
            ./ci/scripts/pre-test.sh ${{ matrix.platform }} ${{ matrix.arch }}
          fi

          docker ps
          pixi run validate

          if [[ -f ci/scripts/post-test.sh ]]; then
            ./ci/scripts/post-test.sh
          fi

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: validation-report
          path: "rust/validation-report.xml"
          retention-days: 7

      - name: Generate docs
        working-directory: rust
        run: |
          pixi run gendocs --output generated

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: docs
          path: "rust/generated/datafusion.md"
          retention-days: 2

  build:
    name: "Build datafusion/${{ matrix.platform }}_${{ matrix.arch }}"
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { platform: linux, arch: amd64, runner: ubuntu-latest }
          - { platform: linux, arch: arm64, runner: ubuntu-24.04-arm }
          - { platform: macos, arch: arm64, runner: macos-latest }
          - { platform: windows, arch: amd64, runner: windows-latest }
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606  # v1.15.4
        with:
          components: "clippy"

      - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4
        with:
          pixi-version: v0.63.2
          run-install: false

      - name: Install dev tools
        working-directory: rust
        run: |
          pixi install

      - name: Log in to ghcr.io
        if: runner.os == 'Linux'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Library
        working-directory: rust
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -f ci/scripts/pre-build.sh ]]; then
            ./ci/scripts/pre-build.sh release ${{ matrix.platform }} ${{ matrix.arch }}
          fi
          set -a
          if [[ -f .env.build ]]; then
            echo "Loading .env.build"
            source .env.build
          fi
          if [[ -f .env.release ]]; then
            source .env.release
          fi
          set +a
          pixi run adbc-make check CI=true VERBOSE=true DRIVER=datafusion IMPL_LANG=rust

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: drivers-${{ matrix.platform }}-${{ matrix.arch }}
          path: "rust/build/libadbc_driver_datafusion.*"
          retention-days: 2

  package:
    name: "Generate Packages"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606  # v1.15.4
        with:
          components: "clippy"

      - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4
        with:
          pixi-version: v0.63.2
          run-install: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: "drivers-*"
          path: "~/drivers"

      - name: Install tools
        working-directory: rust
        run: |
          cargo install cargo-about

      - name: Generate packages
        working-directory: rust
        run: |
          pixi install

          pixi run adbc-gen-package \
            --name datafusion \
            --root $(pwd) \
            --manifest-template $(pwd)/manifest.toml \
            ${{ (inputs.release && '--release') || '' }}\
            -o ~/packages \
            ~/drivers/drivers-*-*/

          ls ~/packages

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: all-packages
          path: ~/packages
          retention-days: 7

  test-packages:
    name: "Test Packages/${{ matrix.platform }}_${{ matrix.arch }}"
    runs-on: ${{ matrix.runner }}
    needs:
      - package
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux, arch: amd64, runner: ubuntu-latest }
          - { platform: macos, arch: arm64, runner: macos-latest }
          - { platform: windows, arch: amd64, runner: windows-latest }
    steps:
      # for now, install dbc from main
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6.3.0
        with:
          go-version: 'stable'
      - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4
        with:
          pixi-version: v0.63.2
          run-install: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: "all-packages"
          path: "~/packages"
      - name: install package
        # dbc uses the filename as the driver name
        run: |
          echo "Installing dbc"
          git clone --depth 1 https://github.com/columnar-tech/dbc
          cd dbc
          go build ./cmd/dbc
          echo "Installed dbc"
          ls -laR ~/packages
          driver_pkg=$(find ~/packages -name '*_${{ matrix.platform }}_${{ matrix.arch }}_*.tar.gz')
          echo "Installing ${driver_pkg}"
          ./dbc install --no-verify "${driver_pkg}"
          echo "Installed ${driver_pkg}"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: 'recursive'
      - name: load package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: rust
        run: |
          if [[ -f ci/scripts/pre-build.sh ]]; then
            echo "Loading pre-build"
            ./ci/scripts/pre-build.sh test ${{ matrix.platform }} ${{ matrix.arch }}
          fi
          set -a
          if [[ -f .env.build ]]; then
            echo "Loading .env.build"
            source .env.build
          fi
          if [[ -f .env.ci ]]; then
            source .env.ci
          fi
          set +a
          pixi exec -s adbc-driver-manager -s pyarrow -s pytest python -m pytest -vs ci/test_package.py

  release:
    name: "Release (Dry Run)"
    runs-on: ubuntu-latest
    needs:
      - package
      - test-packages
      - validate
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: 'recursive'

      - uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4
        with:
          pixi-version: v0.63.2
          run-install: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: "all-packages"
          path: "~/packages"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: "docs"
          path: "~/packages"

      - name: Release (dry-run)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: rust
        run: |
          git tag rust/v1000.0.0
          tag=rust/v1000.0.0

          pixi run release --dry-run $(pwd) $tag
          echo gh release upload $tag $(find ~/packages -name '*.tar.gz') $(find ~/packages -name 'manifest.yaml') $(find ~/packages -name '*.md')
