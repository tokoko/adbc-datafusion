repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 5ba58aca0bd5bc7c0e1c0fc45af2e88d6a2bde83  # frozen: v0.14.10
  hooks:
  - id: ruff-check
    name: "ruff check"
    args: ["--extend-select", "I", "--fix"]
  - id: ruff-format

- repo: https://github.com/codespell-project/codespell
  rev: 63c8f8312b7559622c0d82815639671ae42132ac  # v2.4.1
  hooks:
  - id: codespell
    exclude: >
        (?x)^(
            .*Cargo\.toml$
        )$

- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: deec0115cd2847f837ac9180c4b7d1edb423fe02  # v18.1.7
  hooks:
  - id: clang-format
    types_or: [c, c++]

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-added-large-files
    args: ["--enforce-all"]
  - id: check-case-conflict
  - id: check-executables-have-shebangs
  - id: check-yaml
  - id: detect-private-key
  - id: end-of-file-fixer
    exclude: '\.sln$'
  - id: mixed-line-ending
    args: [--fix=lf]
    exclude: '\.(bat|sln)$'
  - id: trailing-whitespace

- repo: https://github.com/adbc-drivers/dev
  rev: a7992420818031b5a8d42fc1b3372fb81e50e3e1
  hooks:
  - id: rat

- repo: local
  hooks:
  - id: cargo fmt
    name: cargo fmt
    language: system
    types: [rust]
    entry: bash -c 'cd rust && cargo +stable fmt --all'
    pass_filenames: false
